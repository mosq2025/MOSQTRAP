<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>History</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="history.css">
</head>

<body>
  <div class="container">
    <!-- MOBILE SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>MOSTRAP</h3>
      </div>
      <div id="navMain" class="nav-item"><img src="icon/dashboard.png" alt="home" class="nav-icon"> Main Dashboard
      </div>
      <div class="nav-item active" id="navHistory"><img src="icon/history.png" alt="history" class="nav-icon"> History
      </div>
      <div id="navManual" class="nav-item"><img src="icon/settings.png" alt="manual" class="nav-icon"> Manual</div>
      <div id="navContact" class="nav-item"><img src="icon/contact.png" alt="contact" class="nav-icon"> Contact
      </div>

      <div class="signout" id="signoutBtn"><img src="icon/logout.png" alt="logout" class="nav-icon"> Sign Out</div>
    </div>

    <div class="main">



      <div class="panel history-panel">
        <h2>History</h2>

        <div class="controls">
          <div class="left">
            <div class="date-range">
              <input type="date" id="startDate"> — <input type="date" id="endDate">
            </div>
          </div>

          <div class="right">
            <input type="text" id="searchDate" placeholder="Search date">
            <div class="actions">
              <button id="applyBtn" class="btn green">Apply Filter</button>
              <button id="downloadBtn" class="btn green">Print</button>
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table id="historyTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Total Mosquitoes</th>
                <th>Risk Assessment</th>
                <th>Last Updated</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2026-01-09</td>
                <td>—</td>
                <td>cleaning</td>
                <td>1/9/2026, 10:32:16 PM</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="footer">
          <label>Rows per page:
            <select id="rowsPerPage">
              <option>10</option>
              <option>25</option>
            </select>
          </label>
          <div class="pagination">1 - 4 of 4</div>
        </div>
      </div>

    </div>
  </div>

  <script src="history.js"></script>
</body>

</html>
